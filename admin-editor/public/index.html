<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Config Editor</title>
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login view (shown when not authenticated and bootstrap not allowed) -->
  <div id="login-view" class="ace-auth-view" style="display: none;">
    <div class="ace-auth-card">
      <h1 class="ace-auth-title">ACE (Admin Config Editor)</h1>
      <form id="login-form" class="ace-auth-form">
        <p class="ace-auth-section-label">Sign in</p>
        <input type="text" id="login-username" name="username" class="ace-auth-input" placeholder="Username" required autocomplete="username" />
        <input type="password" id="login-password" name="password" class="ace-auth-input" placeholder="Password" required autocomplete="current-password" />
        <p id="login-error" class="ace-auth-error" style="display: none;"></p>
        <button type="submit" id="login-submit" class="btn btn-primary ace-auth-btn">Sign in</button>
        <p class="ace-auth-footer" id="login-create-first-wrap" style="display: none;">
          <a href="#" id="create-first-account-link">Create first account</a>
        </p>
      </form>
      <hr class="ace-auth-rule" />
      <div class="ace-auth-request">
        <p class="ace-auth-section-label">Request access</p>
        <input type="email" class="ace-auth-input" placeholder="Email" autocomplete="email" />
        <input type="text" class="ace-auth-input" placeholder="Note" />
        <button type="button" class="btn btn-secondary ace-auth-btn" disabled>Send request</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap: create first admin (shown when no users exist) -->
  <div id="bootstrap-view" class="ace-auth-view" style="display: none;">
    <div class="ace-auth-card">
      <h1 class="ace-auth-title">ACE — Create first account</h1>
      <p class="ace-auth-subtitle">Create an admin account to get started</p>
      <form id="bootstrap-form" class="ace-auth-form">
        <label for="bootstrap-username" class="ace-auth-label">Username</label>
        <input type="text" id="bootstrap-username" name="username" class="ace-auth-input" required autocomplete="username" />
        <label for="bootstrap-password" class="ace-auth-label">Password</label>
        <input type="password" id="bootstrap-password" name="password" class="ace-auth-input" required autocomplete="new-password" minlength="8" />
        <p id="bootstrap-error" class="ace-auth-error" style="display: none;"></p>
        <button type="submit" id="bootstrap-submit" class="btn btn-primary">Create admin</button>
      </form>
    </div>
  </div>

  <!-- App shell (shown when authenticated) -->
  <div id="app-shell" style="display: none;">
  <header class="ace-topbar" role="banner">
    <div class="ace-topbar-inner">
      <div class="ace-topbar-brand">
        <img src="/assets/logo-DAT_darkmode.svg" alt="FigmAI Design Toolkit" class="ace-logo" height="16" width="127" />
        <span class="ace-topbar-sep" aria-hidden="true"></span>
        <span class="ace-topbar-label" id="ace-label">Admin Config Editor</span>
      </div>
      <div class="ace-topbar-actions" id="ace-topbar-actions">
        <button type="button" id="reload-btn" class="ace-topbar-btn ace-topbar-btn--ghost">
          <i data-lucide="rotate-ccw"></i>Reset
        </button>
        <button type="button" id="validate-btn" class="ace-topbar-btn ace-topbar-btn--outline">
          <i data-lucide="check-circle"></i>Validate
        </button>
        <button type="button" id="save-btn" class="ace-topbar-btn ace-topbar-btn--primary" disabled>
          <i data-lucide="save"></i>Save
        </button>
      </div>
    </div>
  </header>

  <div id="app" class="ace-shell">
    <div class="ace-content-area ace-container">
      <aside class="ace-sidebar" aria-label="Editor sections">
        <nav id="ace-nav" class="tabs ace-leftnav" role="tablist" aria-label="Editor sections">
          <div class="ace-nav-group ace-nav-group-primary">
            <button type="button" role="tab" class="ace-nav-item" data-tab="config" aria-selected="true" aria-controls="panel-config" tabindex="0">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
              <span class="ace-nav-label">General</span>
            </button>
            <button type="button" role="tab" class="ace-nav-item" data-tab="ai" aria-selected="false" aria-controls="panel-ai" tabindex="0">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
              <span class="ace-nav-label">AI</span>
            </button>
            <button type="button" role="tab" class="ace-nav-item" data-tab="assistants" aria-selected="false" aria-controls="panel-assistants" tabindex="0">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span class="ace-nav-label">Assistants</span>
            </button>
            <button type="button" role="tab" class="ace-nav-item" id="tab-knowledge-bases" data-tab="knowledge-bases" aria-selected="false" aria-controls="panel-knowledge-bases" tabindex="0">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              <span class="ace-nav-label">Resources</span>
            </button>
            <button type="button" role="tab" class="ace-nav-item" id="tab-registries" data-tab="registries" aria-selected="false" aria-controls="panel-registries" tabindex="-1" style="display: none;">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>
              <span class="ace-nav-label">Design Systems</span>
            </button>
            <button type="button" role="tab" class="ace-nav-item" id="tab-analytics" data-tab="analytics" aria-selected="false" aria-controls="panel-analytics" tabindex="-1" style="display: none;">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
              <span class="ace-nav-label">Usage Report</span>
            </button>
          </div>
          <div class="ace-nav-group ace-nav-group-secondary">
            <button type="button" class="ace-nav-item" data-action="coming-soon" aria-label="Help – coming soon">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
              <span class="ace-nav-label">Help</span>
            </button>
            <button type="button" class="ace-nav-item ace-nav-server is-disconnected" id="server-status-nav-btn" data-action="server-status" aria-label="Server status">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>
              <span class="ace-nav-label">Server: <span id="nav-status-label">—</span></span>
            </button>
            <div id="status" class="visually-hidden" aria-hidden="true">
              <span id="status-connection">—</span>
              <span id="status-loaded">—</span>
              <span id="status-repo">—</span>
            </div>
            <button type="button" role="tab" class="ace-nav-item" id="tab-users" data-tab="users" aria-selected="false" aria-controls="panel-users" tabindex="-1" style="display: none;">
              <svg class="ace-nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span class="ace-nav-label">Users</span>
            </button>
            <div id="ace-nav-profile-widget" class="ace-nav-profile-widget" aria-live="polite"></div>
          </div>
        </nav>
        <div class="visually-hidden" aria-hidden="true">
          <button type="button" role="tab" data-tab="knowledge" aria-controls="panel-knowledge" tabindex="-1">Knowledge</button>
        </div>
      </aside>

      <div class="ace-main">
      <div id="ace-page-header-bar" class="ace-page-header-bar">
        <div class="ace-page-header-left">
          <p class="ace-page-header-eyebrow" id="ace-page-eyebrow">Plugin Settings</p>
          <h1 id="ace-page-title-text" class="ace-page-header-title">General</h1>
        </div>
      </div>
      <div id="unsaved-banner" class="unsaved-banner" style="display: none;">
        Unsaved changes
        <button type="button" id="discard-all-btn">Discard all changes</button>
      </div>

      <main class="main">
        <div id="tab-subheader" class="tab-subheader" aria-live="polite"></div>
        <section id="panel-config" role="tabpanel" class="panel" aria-hidden="false"></section>
        <section id="panel-ai" role="tabpanel" class="panel" aria-hidden="true"></section>
        <section id="panel-assistants" role="tabpanel" class="panel" aria-hidden="true"></section>
        <section id="panel-knowledge-bases" role="tabpanel" class="panel" aria-hidden="true" style="display: none;"></section>
        <section id="panel-knowledge" role="tabpanel" class="panel" aria-hidden="true"></section>
        <section id="panel-content-models" role="tabpanel" class="panel" aria-hidden="true" style="display: none;"></section>
        <section id="panel-registries" role="tabpanel" class="panel" aria-hidden="true" style="display: none;"></section>
        <section id="panel-analytics" role="tabpanel" class="panel" aria-hidden="true" style="display: none;"></section>
        <section id="panel-users" role="tabpanel" class="panel" aria-hidden="true" style="display: none;"></section>
      </main>

      <div id="conflict-banner" class="conflict-banner" style="display: none;">
        <span>Files changed on disk. Reload to get the latest.</span>
        <button type="button" id="reload-after-conflict-btn">Reload</button>
      </div>

      <footer class="footer visually-hidden" aria-hidden="true">
        <div id="footer-status" class="footer-status" style="display: none;" aria-live="polite"></div>
        <div id="validation-message" class="validation-message"></div>
        <div id="save-summary" class="save-summary" style="display: none;"></div>
        <div id="preview-summary" class="preview-summary" style="display: none;"></div>
      </footer>
      </div>
    </div>
  </div>
  </div><!-- /#app-shell -->

  <div id="action-modal" class="ace-modal" role="dialog" aria-modal="true" aria-labelledby="action-modal-title" aria-live="polite" hidden>
    <div class="ace-modal-backdrop" id="action-modal-backdrop"></div>
    <div class="ace-modal-panel">
      <div id="action-modal-loading" class="ace-modal-state" hidden>
        <p id="action-modal-loading-text" class="ace-modal-message">Saving…</p>
      </div>
      <div id="action-modal-success" class="ace-modal-state" hidden>
        <h2 id="action-modal-title" class="ace-modal-title">Done</h2>
        <div id="action-modal-success-text" class="ace-modal-message"></div>
        <button type="button" id="action-modal-close-btn" class="btn btn-primary">Close</button>
      </div>
      <div id="action-modal-error" class="ace-modal-state" hidden>
        <h2 class="ace-modal-title ace-modal-error-title">Error</h2>
        <p id="action-modal-error-text" class="ace-modal-message"></p>
        <div class="ace-modal-actions">
          <button type="button" id="action-modal-copy-btn" class="btn btn-secondary">Copy error</button>
          <button type="button" id="action-modal-retry-btn" class="btn btn-ghost" hidden>Retry</button>
          <button type="button" id="action-modal-close-error-btn" class="btn btn-primary">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
